{% extends "layout.html" %}
{% block content %}

<div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>Staff Dashboard</h2>
    <a href="/logout"><button>Logout</button></a>
</div>

<a href="/create_event">
    <button>Create Event</button>
</a>

{% if events %}
    {% for event in events %}
    <div class="card">
        <h3>{{ event[1] }}</h3>
        <p>{{ event[2] }}</p>
        <p>Date: {{ event[3] }}</p>
    </div>
    {% endfor %}
{% else %}
    <p>No events created yet.</p>
{% endif %}

{% endblock %}
