{% extends "layout.html" %}
{% block content %}

<div style="display: flex; justify-content: space-between; align-items: center;">
    <h2>All Events</h2>
    <div>
        <a href="/student"><button>Dashboard</button></a>
        <a href="/logout"><button>Logout</button></a>
    </div>
</div>

{% for event in events %}
<div class="card">
    <h3>{{ event[1] }}</h3>
    <p>{{ event[2] }}</p>
    <p>Date: {{ event[3] }}</p>

    {% if event[0] in registered_ids %}
        <p class="status">Registered</p>
    {% else %}
        <a href="/register_event/{{ event[0] }}">
            <button>Register</button>
        </a>
    {% endif %}
</div>
{% endfor %}

{% endblock %}
